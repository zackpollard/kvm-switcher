servers:
  # AMI MegaRAC BMC (e.g. ASRock Rack servers)
  # KVM: Container-based (JViewer + noVNC)
  # IPMI: Web proxy with auto-login via cookie injection
  - name: "server-1"
    bmc_ip: "10.10.11.251"
    bmc_port: 80
    board_type: "ami_megarac"
    username: "admin"
    credential_env: "BMC_PASSWORD_SERVER1"

  # Dell iDRAC9 (14th gen+, e.g. R640)
  # KVM: HTML5 via VNC proxy (port 5901)
  # IPMI: Web proxy with auto-login via Angular scope injection
  - name: "dell-14g"
    bmc_ip: "10.10.11.194"
    board_type: "dell_idrac9"    # port defaults to 443 (HTTPS)
    username: "root"
    credential_env: "BMC_PASSWORD_DELL"

  # Dell iDRAC8 (13th gen, e.g. R730xd)
  # KVM: VNC proxy (port 5901)
  # IPMI: Web proxy with login page bypass (redirects to dashboard)
  - name: "dell-13g"
    bmc_ip: "10.10.11.92"
    board_type: "dell_idrac8"    # port defaults to 443 (HTTPS)
    username: "root"
    credential_env: "BMC_PASSWORD_DELL"

  # Sipeed NanoKVM
  # KVM: Native web UI proxy (MJPEG/H264 video + WebSocket HID)
  # The NanoKVM web interface IS the KVM client — no separate IPMI panel
  - name: "my-nanokvm"
    bmc_ip: "10.10.11.246"
    bmc_port: 80
    board_type: "nanokvm"
    username: "admin"
    credential_env: "NANOKVM_PASSWORD"

  # APC UPS with Network Management Card 2
  # Panel: Web proxy with login bypass (URL-based session tokens)
  - name: "ups-1"
    bmc_ip: "10.10.50.226"
    bmc_port: 80
    board_type: "apc_ups"
    username: "apc"
    credential_env: "APC_PASSWORD"

  # APC PDU with Network Management Card 2 (same board_type as UPS)
  - name: "pdu-1"
    bmc_ip: "10.10.11.144"
    bmc_port: 80
    board_type: "apc_ups"
    username: "apc"
    credential_env: "APC_PASSWORD"

settings:
  # Container runtime: "docker" or "kubernetes"
  runtime: "docker"

  # Container image for KVM sessions (AMI MegaRAC only)
  container_image: "kvm-switcher/jviewer:latest"

  # Kubernetes settings (only used when runtime is "kubernetes")
  # kube_namespace: "kvm-switcher"    # namespace for KVM pods (must exist)
  # kube_config: ""                   # path to kubeconfig; leave empty for in-cluster

  max_concurrent_sessions: 4
  session_timeout_minutes: 60
  idle_timeout_minutes: 30
  listen_address: "0.0.0.0:8080"

  # Production hardening (all optional with sensible defaults)
  # cors_origins: ["*"]                 # Allowed CORS origins (env: KVM_CORS_ORIGINS)
  # rate_limit_rpm: 60                  # Per-IP rate limit for session/auth endpoints (env: KVM_RATE_LIMIT_RPM)
  # db_path: "data/kvm-switcher.db"     # SQLite database for audit log + persistent sessions (env: KVM_DB_PATH)
  # audit_log: true                     # Enable audit logging (env: KVM_AUDIT_LOG)
  # metrics_enabled: false              # Enable Prometheus /metrics endpoint (env: KVM_METRICS_ENABLED)
  # bmc_creds_ttl_minutes: 120          # TTL for stale BMC credential cleanup (env: KVM_BMC_CREDS_TTL_MINUTES)

# Optional: OIDC authentication with role-based server access
# When enabled, users must authenticate via OIDC and can only access
# servers their roles grant them permission to.
# oidc:
#   enabled: true
#   issuer_url: "https://auth.example.com/realms/myorg"
#   client_id: "kvm-switcher"
#   client_secret_env: "OIDC_CLIENT_SECRET"
#   redirect_url: "http://localhost:8080/auth/callback"
#   scopes: ["openid", "profile", "email", "groups"]
#   role_claim: "groups"   # JWT claim containing user roles/groups
#   role_mappings:
#     admin:
#       servers: ["*"]     # wildcard grants access to all servers
#     ops-team:
#       servers: ["server-1", "dell-14g", "ups-1"]
#     dev-team:
#       servers: ["server-1"]
