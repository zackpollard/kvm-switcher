name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race

  frontend-checks:
    name: Frontend Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run check
        working-directory: web

      - name: Test
        run: npm run test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: kvm-switcher
            context: .
            file: Dockerfile
          - image: jviewer
            context: docker/jviewer
            file: docker/jviewer/Dockerfile
            platform: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform || 'linux/amd64' }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
