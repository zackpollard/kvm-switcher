name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race

      - name: Check OpenAPI spec is up to date
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -o api --outputTypes yaml
          if ! git diff --exit-code api/swagger.yaml; then
            echo "::error::api/swagger.yaml is out of date. Run 'make generate-api' and commit the result."
            exit 1
          fi

  frontend-checks:
    name: Frontend Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run check
        working-directory: web

      - name: Test
        run: npm run test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Run E2E tests
        run: bash tests/e2e/run-ci.sh
        env:
          MOCK_BMC_PASSWORD: admin

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/e2e/test-results/
          retention-days: 7

  docker-build:
    name: "Build ${{ matrix.image }} (${{ matrix.platform }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: kvm-switcher
            context: .
            file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: kvm-switcher
            context: .
            file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }},mode=max
