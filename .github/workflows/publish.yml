name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
      changelog: ${{ steps.version.outputs.changelog }}
      bumped: ${{ steps.version.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version from conventional commits
        id: version
        run: |
          # Find the highest semver tag (regardless of ancestry — survives force-pushes)
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi
          echo "Latest tag: $latest_tag"

          # Parse current version
          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          # Find the merge-base between the tag and HEAD for commit analysis.
          # If the tag is an ancestor of HEAD, use it directly.
          # If not (e.g., after force-push), analyze all commits on HEAD.
          if git merge-base --is-ancestor "$latest_tag" HEAD 2>/dev/null; then
            commit_range="${latest_tag}..HEAD"
          else
            echo "Tag $latest_tag is not an ancestor of HEAD (force-push?), analyzing all commits"
            commit_range="HEAD"
          fi

          # Analyze commits since last tag
          bump="none"
          changelog=""

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            subject=$(echo "$line" | sed 's/^[^ ]* //')

            # Check for breaking changes
            if echo "$subject" | grep -qiE '^[a-z]+(\(.*\))?!:'; then
              bump="major"
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^feat(\(.*\))?:'; then
              if [ "$bump" != "major" ]; then bump="minor"; fi
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^fix(\(.*\))?:'; then
              if [ "$bump" = "none" ]; then bump="patch"; fi
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^(perf|refactor)(\(.*\))?:'; then
              if [ "$bump" = "none" ]; then bump="patch"; fi
              changelog="${changelog}\n- ${subject}"
            fi
          done <<< "$(git log "$commit_range" --oneline 2>/dev/null)"

          if [ "$bump" = "none" ]; then
            echo "No version bump needed"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=${version}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump version
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          # Check if the computed tag already exists (prevents collisions)
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag $new_tag already exists, skipping"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump: $bump -> $new_tag"

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
          echo "changelog<<CHANGES_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$changelog" >> "$GITHUB_OUTPUT"
          echo "CHANGES_EOF" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1 -race

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: [version, test]
    if: needs.version.outputs.bumped == 'true'
    strategy:
      matrix:
        include:
          - image: kvm-switcher
            context: .
            file: Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: jviewer
            context: docker/jviewer
            file: docker/jviewer/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: needs.version.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag "${{ needs.version.outputs.new_tag }}"
          git push origin "${{ needs.version.outputs.new_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: |
            ## Changes
            ${{ needs.version.outputs.changelog }}

            ## Docker Images
            ```
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/kvm-switcher:${{ needs.version.outputs.new_version }}
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/jviewer:${{ needs.version.outputs.new_version }}
            ```
          generate_release_notes: false
