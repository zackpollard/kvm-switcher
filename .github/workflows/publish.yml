name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
      changelog: ${{ steps.version.outputs.changelog }}
      bumped: ${{ steps.version.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version from conventional commits
        id: version
        run: |
          # Find the highest semver tag (regardless of ancestry — survives force-pushes)
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi
          echo "Latest tag: $latest_tag"

          # Parse current version
          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          # Find the merge-base between the tag and HEAD for commit analysis.
          # If the tag is an ancestor of HEAD, use it directly.
          # If not (e.g., after force-push), analyze all commits on HEAD.
          if git merge-base --is-ancestor "$latest_tag" HEAD 2>/dev/null; then
            commit_range="${latest_tag}..HEAD"
          else
            echo "Tag $latest_tag is not an ancestor of HEAD (force-push?), analyzing all commits"
            commit_range="HEAD"
          fi

          # Analyze commits since last tag
          bump="none"
          changelog=""

          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            subject=$(echo "$line" | sed 's/^[^ ]* //')

            # Check for breaking changes
            if echo "$subject" | grep -qiE '^[a-z]+(\(.*\))?!:'; then
              bump="major"
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^feat(\(.*\))?:'; then
              if [ "$bump" != "major" ]; then bump="minor"; fi
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^fix(\(.*\))?:'; then
              if [ "$bump" = "none" ]; then bump="patch"; fi
              changelog="${changelog}\n- ${subject}"
            elif echo "$subject" | grep -qiE '^(perf|refactor)(\(.*\))?:'; then
              if [ "$bump" = "none" ]; then bump="patch"; fi
              changelog="${changelog}\n- ${subject}"
            fi
          done <<< "$(git log "$commit_range" --oneline 2>/dev/null)"

          if [ "$bump" = "none" ]; then
            echo "No version bump needed"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=${version}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump version
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          # Check if the computed tag already exists (prevents collisions)
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag $new_tag already exists, skipping"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump: $bump -> $new_tag"

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
          echo "changelog<<CHANGES_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$changelog" >> "$GITHUB_OUTPUT"
          echo "CHANGES_EOF" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1 -race

  # Build each image on native runners (no QEMU emulation), push by digest.
  # The merge job combines digests into multi-arch manifest lists.
  publish:
    name: "Build ${{ matrix.image }} (${{ matrix.platform }})"
    needs: [version, test]
    if: needs.version.outputs.bumped == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: kvm-switcher
            context: .
            file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - image: kvm-switcher
            context: .
            file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform digests into multi-arch manifest lists.
  merge:
    name: "Merge ${{ matrix.image }} manifest"
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: needs.version.outputs.bumped == 'true'
    strategy:
      matrix:
        image: [kvm-switcher]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}"
          VERSION="${{ needs.version.outputs.new_version }}"

          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            $(printf "${IMAGE}@sha256:%s " *)

  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [version, merge]
    if: needs.version.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag "${{ needs.version.outputs.new_tag }}"
          git push origin "${{ needs.version.outputs.new_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          body: |
            ## Changes
            ${{ needs.version.outputs.changelog }}

            ## Docker Images
            ```
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/kvm-switcher:${{ needs.version.outputs.new_version }}
            ```
          generate_release_notes: false
