openapi: "3.0.3"

info:
  title: KVM Switcher API
  description: >
    Web-based KVM panel for managing remote server consoles via BMC/IPMI.
    Supports AMI MegaRAC (native iKVM), Dell iDRAC (VNC/WebSocket), and NanoKVM devices.
    Optional OIDC authentication with role-based access control.
  version: "1.0.0"
  license:
    name: MIT

servers:
  - url: /
    description: Same-origin (frontend served alongside API)

tags:
  - name: auth
    description: OIDC authentication (login, callback, logout, status)
  - name: servers
    description: Server listing and status
  - name: sessions
    description: KVM session lifecycle (create, list, get, keepalive, delete)
  - name: kvm-control
    description: iKVM control commands sent through the active IVTP tunnel
  - name: ipmi
    description: BMC/IPMI web session management
  - name: audit
    description: Audit log queries
  - name: health
    description: Health and readiness probes
  - name: websocket
    description: WebSocket endpoints for KVM and NanoKVM streaming

paths:
  # ── Auth ────────────────────────────────────────────────────────────────

  /auth/login:
    get:
      tags: [auth]
      summary: Redirect to OIDC provider
      description: >
        Initiates the OIDC authorization code flow. Redirects the browser
        to the configured identity provider. Only available when OIDC is enabled.
      responses:
        "302":
          description: Redirect to OIDC provider authorization endpoint
          headers:
            Location:
              schema:
                type: string
                format: uri

  /auth/callback:
    get:
      tags: [auth]
      summary: OIDC callback
      description: >
        Handles the OIDC authorization code callback. Exchanges the code for
        tokens, creates a server-side session, sets a session cookie, and
        redirects to the application root.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the OIDC provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: CSRF state parameter
      responses:
        "302":
          description: Redirect to / after successful authentication
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
              description: Session cookie
        "400":
          description: Invalid callback parameters
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Token exchange or session creation failed
          content:
            text/plain:
              schema:
                type: string

  /auth/logout:
    get:
      tags: [auth]
      summary: Log out
      description: Clears the server-side session and session cookie, then redirects to /.
      responses:
        "302":
          description: Redirect to / after session is cleared
          headers:
            Location:
              schema:
                type: string

  /auth/me:
    get:
      tags: [auth]
      summary: Get authentication status
      description: >
        Returns the current authentication state. When OIDC is disabled,
        returns `{"authenticated": false, "oidc_enabled": false}`.
        When OIDC is enabled and the user is authenticated, includes
        email, name, and roles.
      responses:
        "200":
          description: Authentication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  # ── Servers ─────────────────────────────────────────────────────────────

  /api/servers:
    get:
      tags: [servers]
      summary: List servers
      description: >
        Returns all configured servers. When OIDC RBAC is enabled, the list
        is filtered to servers the authenticated user has access to.
      responses:
        "200":
          description: Array of server info objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerInfo"

  /api/server-status:
    get:
      tags: [servers]
      summary: Get all server statuses
      description: >
        Returns cached status information for all configured devices, keyed
        by server name. Includes power state, health, UPS metrics, and
        circuit breaker state.
      responses:
        "200":
          description: Map of server name to device status
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/DeviceStatus"

  # ── Sessions ────────────────────────────────────────────────────────────

  /api/sessions:
    post:
      tags: [sessions]
      summary: Create a KVM session
      description: >
        Creates a new KVM session for the specified server. If a session already
        exists for the server, returns the existing session (200). The session
        starts asynchronously; poll GET /api/sessions/{id} until status is
        "connected". Returns 429 if the concurrent session limit is reached.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Existing active session returned (already exists for this server)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVMSession"
        "202":
          description: Session created and starting asynchronously
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVMSession"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: OIDC access denied to this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Maximum concurrent sessions reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [sessions]
      summary: List all sessions
      description: Returns all KVM sessions (active, starting, disconnected, and errored).
      responses:
        "200":
          description: Array of KVM sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KVMSession"

  /api/sessions/{id}:
    get:
      tags: [sessions]
      summary: Get session details
      description: >
        Returns a single KVM session by ID. Connected sessions include
        the `idle_timeout_remaining_seconds` field.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session details with optional idle timeout info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVMSessionWithTimeout"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [sessions]
      summary: Delete a session
      description: >
        Terminates a KVM session. Logs out from the BMC, stops any active
        iKVM or VNC bridges, and marks the session as disconnected.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVMSession"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/keepalive:
    patch:
      tags: [sessions]
      summary: Keep session alive
      description: >
        Resets the idle timeout for a session by updating its last activity
        timestamp.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Keepalive acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── KVM Control ─────────────────────────────────────────────────────────

  /api/sessions/{id}/power:
    post:
      tags: [kvm-control]
      summary: Power control
      description: >
        Sends a power command to the server through the active KVM tunnel.
        Most actions use the IVTP protocol; `bmc_reset` uses ipmitool for
        a BMC cold reset.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PowerControlRequest"
      responses:
        "200":
          description: Power command sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PowerControlResponse"
        "400":
          description: Invalid request body or action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Power command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/display-lock:
    post:
      tags: [kvm-control]
      summary: Display lock
      description: Locks or unlocks the host server's physical display output.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisplayLockRequest"
      responses:
        "200":
          description: Display lock state changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisplayLockResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Display lock command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/reset-video:
    post:
      tags: [kvm-control]
      summary: Reset video engine
      description: >
        Sends a pause/resume cycle to reset the BMC's video capture engine.
        No request body required.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Video engine reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Reset video command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/mouse-mode:
    post:
      tags: [kvm-control]
      summary: Set mouse mode
      description: Switches between relative and absolute mouse input modes.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MouseModeRequest"
      responses:
        "200":
          description: Mouse mode changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MouseModeResponse"
        "400":
          description: Invalid request body or mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Mouse mode command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/keyboard-layout:
    post:
      tags: [kvm-control]
      summary: Set keyboard layout
      description: >
        Changes the keyboard layout for the KVM session. Supported layouts
        map to JViewer keyboard layout codes.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyboardLayoutRequest"
      responses:
        "200":
          description: Keyboard layout changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyboardLayoutResponse"
        "400":
          description: Invalid request body or layout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Keyboard layout command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/ipmi:
    post:
      tags: [kvm-control]
      summary: Raw IPMI command
      description: Sends a raw IPMI command through the KVM tunnel as base64-encoded bytes.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IPMICommandRequest"
      responses:
        "200":
          description: IPMI command sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Invalid request body or empty data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: IPMI command failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/sessions/{id}/screenshot:
    get:
      tags: [kvm-control]
      summary: Get screenshot
      description: Returns the current KVM framebuffer as a PNG image.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: PNG screenshot of the current framebuffer
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: No active KVM bridge for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: No framebuffer available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── IPMI Session ────────────────────────────────────────────────────────

  /api/ipmi-session/{name}:
    post:
      tags: [ipmi]
      summary: Create IPMI web session
      description: >
        Pre-authenticates with the BMC and returns session credentials so
        the IPMI web UI can load directly to the dashboard without a login
        prompt. Credentials are injected into the reverse proxy.
      parameters:
        - name: name
          in: path
          required: true
          description: Server name from the configuration
          schema:
            type: string
      responses:
        "200":
          description: BMC session credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IPMISession"
        "403":
          description: OIDC access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: BMC authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Audit Log ───────────────────────────────────────────────────────────

  /api/audit-log:
    get:
      tags: [audit]
      summary: Query audit log
      description: >
        Returns audit log entries filtered by the given query parameters.
        Returns 404 if audit logging is not enabled.
      parameters:
        - name: event_type
          in: query
          description: >
            Filter by event type (e.g. session_create, session_delete,
            session_keepalive, ipmi_session, kvm_power_control,
            kvm_display_lock, kvm_reset_video, kvm_mouse_mode,
            kvm_keyboard_layout, kvm_ipmi_command, kvm_screenshot,
            kvm_bmc_reset)
          schema:
            type: string
        - name: server_name
          in: query
          description: Filter by server name
          schema:
            type: string
        - name: user_email
          in: query
          description: Filter by user email
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of entries to return
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          description: Number of entries to skip (for pagination)
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Array of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "404":
          description: Audit log not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to query audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── WebSocket ───────────────────────────────────────────────────────────

  /ws/kvm/{id}:
    get:
      tags: [websocket]
      summary: KVM WebSocket proxy (VNC binary subprotocol)
      description: >
        Upgrades to a WebSocket connection and proxies VNC/iKVM traffic
        between the browser and the BMC. For iKVM sessions, the bridge
        authenticates with the BMC and establishes an IVTP tunnel on
        connect. For WebSocket sessions, proxies to the remote WSS
        endpoint. For VNC sessions, proxies to the raw TCP VNC port.
        Uses the "binary" WebSocket subprotocol.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "101":
          description: WebSocket upgrade successful (binary subprotocol)
        "404":
          description: Session not found or not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ws:
    get:
      tags: [websocket]
      summary: NanoKVM WebSocket proxy (HID)
      description: >
        Proxies WebSocket connections from the NanoKVM SPA to the actual
        NanoKVM device for HID (keyboard/mouse) traffic. The target device
        is identified by the `nano-kvm-token` cookie.
      parameters:
        - name: nano-kvm-token
          in: cookie
          required: true
          description: Authentication token identifying which NanoKVM device to proxy to
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade successful
        "401":
          description: Missing or unknown nano-kvm-token cookie
          content:
            text/plain:
              schema:
                type: string

  # ── Health ──────────────────────────────────────────────────────────────

  /healthz:
    get:
      tags: [health]
      summary: Health check
      description: Returns 200 if the server process is running.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"

  /readyz:
    get:
      tags: [health]
      summary: Readiness check
      description: >
        Returns 200 if the server is ready to accept traffic (database is
        reachable). Returns 503 if the database is unreachable.
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyOk"
        "503":
          description: Server is not ready (database unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyUnavailable"

components:
  # ── Parameters ──────────────────────────────────────────────────────────

  parameters:
    SessionId:
      name: id
      in: path
      required: true
      description: KVM session ID (8-character UUID prefix)
      schema:
        type: string
        example: "a1b2c3d4"

  # ── Schemas ─────────────────────────────────────────────────────────────

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
      example:
        error: "session not found"

    StatusOk:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: ["ok"]
      example:
        status: "ok"

    HealthOk:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: ["ok"]
      example:
        status: "ok"

    ReadyOk:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: ["ready"]
      example:
        status: "ready"

    ReadyUnavailable:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: ["unavailable"]
        reason:
          type: string
      example:
        status: "unavailable"
        reason: "database unreachable"

    AuthStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        oidc_enabled:
          type: boolean
          description: Whether OIDC is configured on the server
        email:
          type: string
          format: email
          description: Present when authenticated
        name:
          type: string
          description: Present when authenticated
        roles:
          type: array
          items:
            type: string
          description: OIDC roles assigned to the user
      example:
        authenticated: true
        oidc_enabled: true
        email: "user@example.com"
        name: "Jane Doe"
        roles: ["admin"]

    ServerInfo:
      type: object
      required: [name, bmc_ip, bmc_port, board_type, has_active_session]
      properties:
        name:
          type: string
          description: Server name from configuration
        bmc_ip:
          type: string
          description: BMC IP address
        bmc_port:
          type: integer
          description: BMC port number
        board_type:
          type: string
          description: Board type identifier
          enum: [ami_megarac, dell_idrac8, dell_idrac9, nanokvm]
        has_active_session:
          type: boolean
          description: Whether this server has an active KVM session
        active_session_id:
          type: string
          description: ID of the active session, if any
      example:
        name: "server-01"
        bmc_ip: "10.0.0.100"
        bmc_port: 443
        board_type: "ami_megarac"
        has_active_session: false

    SessionStatus:
      type: string
      enum: [starting, connected, disconnected, error]
      description: Lifecycle state of a KVM session

    KVMMode:
      type: string
      enum: [websocket, vnc, ikvm]
      description: >
        How the KVM session connects to the BMC.
        websocket = proxy WS to remote WSS (iDRAC9 HTML5),
        vnc = proxy WS to raw TCP VNC (iDRAC8),
        ikvm = native IVTP protocol (AMI MegaRAC)

    KVMSession:
      type: object
      required: [id, server_name, bmc_ip, status, created_at, last_activity]
      properties:
        id:
          type: string
          description: Session ID (8-character UUID prefix)
          example: "a1b2c3d4"
        server_name:
          type: string
          description: Name of the server this session connects to
        bmc_ip:
          type: string
          description: BMC IP address
        status:
          $ref: "#/components/schemas/SessionStatus"
        conn_mode:
          $ref: "#/components/schemas/KVMMode"
        kvm_password:
          type: string
          description: VNC auth password (present for VNC mode sessions)
        created_at:
          type: string
          format: date-time
        last_activity:
          type: string
          format: date-time
        error:
          type: string
          description: Error message when status is "error"

    KVMSessionWithTimeout:
      description: KVM session with optional idle timeout remaining field
      allOf:
        - $ref: "#/components/schemas/KVMSession"
        - type: object
          properties:
            idle_timeout_remaining_seconds:
              type: number
              format: double
              description: >
                Seconds until the session is reaped for idleness.
                Only present when session status is "connected".

    CreateSessionRequest:
      type: object
      required: [server_name]
      properties:
        server_name:
          type: string
          description: Name of the server to create a KVM session for
      example:
        server_name: "server-01"

    DeviceStatus:
      type: object
      required: [online]
      properties:
        online:
          type: boolean
        power_state:
          type: string
          enum: ["on", "off", ""]
        model:
          type: string
        health:
          type: string
          enum: ["ok", "warning", "critical", ""]
        load_watts:
          type: number
          format: double
        load_pct:
          type: number
          format: double
          description: UPS load as percentage of rated capacity
        load_amps:
          type: number
          format: double
        voltage:
          type: number
          format: double
        battery_pct:
          type: number
          format: double
        runtime_min:
          type: number
          format: double
        temperature_c:
          type: number
          format: double
        app_version:
          type: string
          description: NanoKVM application version
        image_version:
          type: string
          description: NanoKVM firmware image version
        update_available:
          type: boolean
          description: NanoKVM firmware update available
        circuit_breaker_state:
          type: string
          enum: [closed, open, half-open]
      example:
        online: true
        power_state: "on"
        health: "ok"
        circuit_breaker_state: "closed"

    IPMISession:
      type: object
      required: [board_type, session_cookie, csrf_token, username, privilege, extended_priv]
      properties:
        board_type:
          type: string
          description: Board type of the server
        session_cookie:
          type: string
          description: BMC session cookie for authenticating web requests
        csrf_token:
          type: string
          description: CSRF token for BMC web API calls
        username:
          type: string
          description: BMC username
        privilege:
          type: integer
          description: BMC privilege level (e.g. 4 = Admin)
        extended_priv:
          type: integer
          description: Extended privileges bitmask
      example:
        board_type: "ami_megarac"
        session_cookie: "SessionCookie=abc123"
        csrf_token: "def456"
        username: "admin"
        privilege: 4
        extended_priv: 259

    AuditEntry:
      type: object
      required: [id, timestamp, event_type]
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        event_type:
          type: string
          description: >
            Type of audited event (e.g. session_create, session_delete,
            ipmi_session, kvm_power_control)
        user_email:
          type: string
          format: email
        server_name:
          type: string
        session_id:
          type: string
        remote_addr:
          type: string
          description: Client IP address
        details:
          description: Additional event-specific data (shape varies by event_type)
      example:
        id: 42
        timestamp: "2026-03-29T10:15:30Z"
        event_type: "session_create"
        user_email: "user@example.com"
        server_name: "server-01"
        session_id: "a1b2c3d4"
        remote_addr: "192.168.1.10"

    PowerControlRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: ["on", "off", "cycle", "reset", "soft_reset", "bmc_reset"]
          description: >
            Power action to perform.
            on/off/cycle/reset/soft_reset use the IVTP protocol;
            bmc_reset performs an IPMI BMC cold reset.
      example:
        action: "cycle"

    PowerControlResponse:
      type: object
      required: [status, action]
      properties:
        status:
          type: string
          enum: ["ok"]
        action:
          type: string
          enum: ["on", "off", "cycle", "reset", "soft_reset", "bmc_reset"]
      example:
        status: "ok"
        action: "cycle"

    DisplayLockRequest:
      type: object
      required: [lock]
      properties:
        lock:
          type: boolean
          description: "true to lock the host display, false to unlock"
      example:
        lock: true

    DisplayLockResponse:
      type: object
      required: [status, lock]
      properties:
        status:
          type: string
          enum: ["ok"]
        lock:
          type: boolean
      example:
        status: "ok"
        lock: true

    MouseModeRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [relative, absolute]
      example:
        mode: "absolute"

    MouseModeResponse:
      type: object
      required: [status, mode]
      properties:
        status:
          type: string
          enum: ["ok"]
        mode:
          type: string
          enum: [relative, absolute]
      example:
        status: "ok"
        mode: "absolute"

    KeyboardLayoutRequest:
      type: object
      required: [layout]
      properties:
        layout:
          type: string
          enum: [en, fr, de, es, jp]
          description: Keyboard layout code
      example:
        layout: "en"

    KeyboardLayoutResponse:
      type: object
      required: [status, layout]
      properties:
        status:
          type: string
          enum: ["ok"]
        layout:
          type: string
          enum: [en, fr, de, es, jp]
      example:
        status: "ok"
        layout: "en"

    IPMICommandRequest:
      type: object
      required: [data]
      properties:
        data:
          type: string
          format: byte
          description: Raw IPMI command bytes, base64-encoded
      example:
        data: "AQIDBA=="
